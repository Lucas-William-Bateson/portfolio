name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  APP: portfolio
  DOCKERFILE: docker/Dockerfile
  PORT: "3000"

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Lucas-William-Bateson/actions/dokku-deploy@main
        with:
          app: ${{ env.APP }}
          dockerfile: ${{ env.DOCKERFILE }}

  preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Lucas-William-Bateson/actions/dokku-deploy@main
        id: deploy
        with:
          app: ${{ env.APP }}-pr-${{ github.event.number }}
          dockerfile: ${{ env.DOCKERFILE }}
          domains: ${{ env.APP }}-pr-${{ github.event.number }}.l3s.me
          ports: http:80:${{ env.PORT }}

      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview: https://${{ env.APP }}-pr-${{ github.event.number }}.l3s.me`
            })

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: self-hosted
    steps:
      - uses: Lucas-William-Bateson/actions/dokku-cleanup@main
        with:
          app: ${{ env.APP }}-pr-${{ github.event.number }}
